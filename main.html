      rel="stylesheet"
      type="text/css"

    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body class="bg-[#F8FAFC] h-screen">
    <!-- Nav bar -->
    <nav class="bg-base-100 shadow-sm">
      <div class="navbar w-11/12 mx-auto">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl"
            ><i class="fa-brands fa-github text-4xl"></i> GitHub Issues
            Tracker</a
          >
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search"
            class="input input-bordered w-24 md:w-auto"
          />
          <button id="btn-search" class="btn btn-primary join-item">
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </div>
    </nav>

    <!-- toggle btn -->
    <section
      class="max-w-9/12 mx-auto mt-[60px] py-6 bg-base-100 shadow pl-6 rounded-md"
    >
      <button class="btn btn-primary">All</button>
      <button class="btn btn-primary btn-outline">Open</button>
      <button class="btn btn-primary btn-outline">Closed</button>
    </section>

    <!-- Issues count  -->
    <section
      class="flex justify-between items-center max-w-9/12 mx-auto mt-[60px] py-4 bg-base-100 shadow px-6 rounded-md"
    >
      <div class="flex items-center gap-2">
        <div class="bg-[#ECE4FF] rounded-full p-2">
          <img class="w-8 h-8" src="./assets/Aperture.png" alt="" />
        </div>
        <div>
          <h4 id="all-count" class="text-[#1F2937] text-[20px] font-semibold">0 Issues</h4>
          <span class="text-[#64748B]"
            >Track and manage your project issues</span
          >
        </div>
      </div>

      <div class="flex gap-4">
        <p class="text-[16px]">
          <i class="text-[#00A96E] fa-solid fa-circle"></i> Open
        </p>
        <p class="text-[16px]">
          <i class="text-purple-500 fa-solid fa-circle"></i> Closed
        </p>
      </div>
    </section>

    <!-- card section -->

    <section id="issues-container" class="max-w-9/12 mx-auto p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
