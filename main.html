<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment-05 | Github Issue Tracker main | Home</title>

    <!-- tailwind & daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-[#F8FAFC] h-full min-h-screen">
    <!-- Nav bar -->
    <nav class="bg-base-100 shadow-sm">
      <div class="navbar w-11/12 mx-auto flex flex-col md:flex-row gap-3">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl"
            ><i class="fa-brands fa-github text-4xl"></i> GitHub Issues
            Tracker</a
          >
        </div>
        <div class="flex gap-2">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input id="input-search" type="search" required placeholder="Search" />
          </label>
          <button id="btn-search" class="btn btn-primary join-item">
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </div>
    </nav>

    <!-- toggle btn -->
    <section
      class="w-[90%] md:max-w-9/12 mx-auto mt-[60px] py-6 bg-base-100 shadow pl-6 rounded-md"
    >
      <button
        onclick="switchTab('all')"
        id="tab-all"
        class="btn border-[#E4E4E7] text-[#64748B]"
      >
        All
      </button>
      <button
        onclick="switchTab('open')"
        id="tab-open"
        class="btn border-[#E4E4E7] text-[#64748B]"
      >
        Open
      </button>
      <button
        onclick="switchTab('closed')"
        id="tab-closed"
        class="btn border-[#E4E4E7] text-[#64748B]"
      >
        Closed
      </button>
    </section>

    <!-- Issues count  -->
    <section
      class="flex justify-between items-center w-[90%] md:max-w-9/12 mx-auto mt-[60px] py-4 bg-base-100 shadow px-6 rounded-t-md"
    >
      <div class="flex items-center gap-2">
        <div class="bg-[#ECE4FF] rounded-full p-2">
          <img class="w-8 h-8" src="./assets/Aperture.png" alt="" />
        </div>
        <div>
          <h4 id="all-count" class="text-[#1F2937] text-[20px] font-semibold">
            0 Issues
          </h4>
          <span class="text-[#64748B]"
            >Track and manage your project issues</span
          >
        </div>
      </div>

      <div class="flex gap-4">
        <p class="text-[16px]">
          <i class="text-[#00A96E] fa-solid fa-circle"></i> Open
        </p>
        <p class="text-[16px]">
          <i class="text-purple-500 fa-solid fa-circle"></i> Closed
        </p>
      </div>
    </section>

    <!-- card section -->

    <!-- spinner -->
     <section id="spinner" class="flex justify-center items-center hidden">
      <span class="loading loading-bars loading-xl"></span>
     </section>

    <section
      id="issues-container"
      class=" md:max-w-9/12 mx-auto p-6 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 shadow-sm"
    ></section>

    <!-- Open the modal using ID.showModal() method -->

    <dialog id="modal_details" class="modal">
      <div class="modal-box">
        <div id="details-container"></div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="./js/script.js"></script>
  </body>
</html>
